  https://schemas.dataspecer.com/documentation-generator-config/:
    partials:
      specification: >-
        {{> definitions}}

        <!DOCTYPE html>

        <html {{#iflng "cs"}}lang="cs"{{lng}}lang="en"{{/iflng}}>
          <head>
            {{> html-head}}
          </head>
          <body>
            <p class="copyright"></p>
            {{> abstract}}

            {{> introduction}}

            <section>
              <h2>{{#iflng "cs"}}Přehled{{lng}}Overview{{/iflng}}</h2>

              {{#each externalArtifacts.svg}}
                <a href="{{{relativePath URL}}}">
                  <figure>
                    <img src="{{{relativePath URL}}}" alt="{{translate ./label}}" />
                    <figcaption>{{translate ./label}}</figcaption>
                  </figure>
                </a>
              {{/each}}
            </section>

            {{#structureModels}}
              <section>
              <h2>
                {{#iflng "cs"}}Specifikace struktury pro{{lng}}Data structure specification for{{/iflng}}
                {{translate humanLabel}}
              </h2>
              <p>{{translate humanDescription}}</p>

              {{#artifacts}}{{#getDocumentation}}{{> (useTemplate)}}{{/getDocumentation}}{{/artifacts}}
              </section>
            {{/structureModels}}

            {{> applicable-legislation}}
            
            {{> examples}}
            
            {{> used-prefixes}}

                {{#if classProfilesByTags.[https://w3id.org/dsv/class-role#main]}}
              <section>
                <h2>{{#iflng "cs"}}Hlavní profily tříd{{lng}}Main class profiles{{/iflng}}</h2>

                {{#each classProfilesByTags.[https://w3id.org/dsv/class-role#main]}}
                  {{> class-profile}}
                {{/each}}
              </section>
            {{/if}}

            {{#if classProfilesByTags.[https://w3id.org/dsv/class-role#supportive]}}
              <section>
                <h2>{{#iflng "cs"}}Podpůrné profily třídy{{lng}}Supportive class profiles{{/iflng}}</h2>

                {{#each classProfilesByTags.[https://w3id.org/dsv/class-role#supportive]}}
                  {{> class-profile}}
                {{/each}}
              </section>
            {{/if}}

            {{#if (non-empty classProfilesByTags.default)}}
              <section>
                {{#if (or classProfilesByTags.[https://w3id.org/dsv/class-role#main] classProfilesByTags.[https://w3id.org/dsv/class-role#supportive])}}
                  <h2>{{#iflng "cs"}}Nezařazené profily tříd{{lng}}Other class profiles{{/iflng}}</h2>
                {{else}}
                  <h2>{{#iflng "cs"}}Profily tříd{{lng}}Class profiles{{/iflng}}</h2>
                {{/if}}

                {{#each classProfilesByTags.default}}
                  {{> class-profile}}
                {{/each}}
              </section>
            {{/if}}

            {{#if semanticEntitiesByType.classes}}
              <section>
                <h2>{{#iflng "cs"}}Třídy{{lng}}Classes{{/iflng}}</h2>

                {{#each locallyDefinedSemanticEntity}}
                  {{#ifEquals type.[0] "class"}}
                    {{> semantic-model-class}}
                  {{/ifEquals}}
                {{/each}}
              </section>
            {{/if}}

            {{#if semanticEntitiesByType.relationships}}
              <section>
                <h2>{{#iflng "cs"}}Vlastnosti{{lng}}Properties{{/iflng}}</h2>
                {{#each locallyDefinedSemanticEntity}}
                  {{#ifEquals type.[0] "relationship"}}
                    {{> semantic-model-relationship}}
                  {{/ifEquals}}
                {{/each}}
              </section>
            {{/if}}

            {{> attachments}}

            {{> acks}}
          </body>
        </html>
      abstract: >-
        <section id="abstract">
          <h2>Abstrakt</h2>
          <p>
              Cílem tohoto dokumentu je specifikovat záznam datové sady s vysokou hodnotou (HVD) v lokálním katalogu dat (LKD) pro jeho harvestování Národním katalogem dat (NKD) dle <a href="../../../dcat-ap-cz-rozhraní-katalogů-dat">DCAT-AP-CZ: Rozhraní katalogů dat</a>, a je založen na OFN pro záznam datové sady otevřených dat <a href="../../../dcat-ap-cz-otevřená-data/">DCAT-AP-CZ: Datové sady otevřených dat</a>.
          </p>
        </section>
      acks: "<section id=\"poděkování\">\r

        \  <h2>Poděkování</h2>\r

        \  <p>\r

        \      Tato otevřená formální norma byla rozvíjena v rámci projektu
        Rozvoj Národního katalogu otevřených dat a infrastruktury Veřejného
        datového fondu <a
        href=\"https://stage.dia.gov.cz/egovernment/projekty-fondy-eu/rozvoj-na\
        rodniho-katalogu-otevrenych-dat-nkod-a-infrastruktury-verejneho-datoveh\
        o-fondu/\">CZ.31.1.0/0.0/0.0/22_050/0007986</a> z nástroje Evropské Unie
        NextGenerationEU prostřednictvím Národního plánu obnovy.\r

        \  </p>\r

        </section>"
      applicable-legislation: "<section id=\"příslušné-právní-předpisy\">\r

        \  <h2>Příslušné právní předpisy</h2>\r

        \r

        \  <p>\r

        \    <a href=\"#DatováSada.příslušnýPrávníPředpis\">Datová sada či
        jejich série</a>, <a
        href=\"#Distribuce.příslušnýPrávníPředpis\">Distribuce datové sady</a> a
        <a href=\"#DatováSlužba.příslušnýPrávníPředpis\">Datové služby</a> se
        označují příslušnými právními předpisy, které předepisují jejich
        vznik.\r

        \    Předpisy jsou identifikovény svými <a
        href=\"https://eur-lex.europa.eu/content/help/eurlex-content/eli.html?l\
        ocale=cs\">ELI</a>.\r

        \    Pro datové sady s vysokou socio-ekonomickou hodnotou je navíc k
        označení indikující otevřená data povinné označit datovou sadu, její HVD
        distribuci (nikoliv každou distribuci) a příslušnou HVD datovou službu
        pomocí ELI prováděcího nařízení:\r

        \  </p>\r

        \r

        \  <ul>\r

        \      <li>Pro označení otevřených dat:
        <code>http://data.europa.eu/eli/dir/2019/1024/oj</code></li>\r

        \      <li>Pro označení dat s vysokou socio-ekonomickou hodnotou (HVD):
        <code>http://data.europa.eu/eli/reg_impl/2023/138/oj</code></li>\r

        \  </ul>\r

        \  \r

        </section>"
      examples: "<section id=\"příklady\">\r

        \    <h2>Příklady</h2>\r

        \r

        \    <p>\r

        \        Tato sekce obsahuje příklady datové sady a série datových
        sad.\r

        \    </p>\r

        \r

        \    <p>\r

        \        Příklady obsahují i příslušná JSON schémata pro validaci
        souborů ve variantě JSON-LD.\r

        \    </p>\r

        \        \r

        \    <section id=\"hvds-dcat-ap-dokumenty-datová-sada-hvd\">\r

        \    <h3>Soubor datové sady HVD</h3>\r

        \    \r

        \    <p>\r

        \        Na URL specifikovaných v souboru katalogu pak NKOD očekává
        soubory v RDF serializaci <a
        href=\"../../propojená-data/#serializace-RDF-Turtle\">Turtle</a> či <a
        href=\"../../propojená-data/#serializace-JSON-LD\">JSON-LD</a>
        obsahující kompletní metadatový záznam datové sady, včetně distribucí.\r

        \        Pro HVD je třeba specifikovat nejen že na datovou sadu se
        vztahuje <a
        href=\"https://eur-lex.europa.eu/eli/reg_impl/2023/138/oj?locale=cs#\">\
        prováděcí nařízení HVD</a>, ale i na které její distribuce a datové
        služby, jelikož to nemusí být na všechny.\r

        \        V každém případě je to indikováno pomocí hodnoty
        <code>dcatap:applicableLegislation</code> (RDF Turtle) či
        <code>právní_předpis</code> (JSON-LD) s hodnotou
        <code>http://data.europa.eu/eli/reg_impl/2023/138/oj</code>.\r

        \    </p>\r

        \    \r

        \    <aside class=\"example\" title=\"Vzorový soubor s metadaty datové
        sady HVD v RDF Turtle\">\r

        \        <p>\r

        \            <a href=\"../příklady/datová-sada-hvd.ttl\">Stáhnout RDF
        Turtle</a>.\r

        \            Umístěno na URL
        <code>https://data.gov.cz/lkod/mdcr/datové-sady/vld</code>.\r

        \        </p>\r

        \        <pre class=\"turtle\">\r

