      introduction: >-
        <section id="úvod">


        <h2>Úvod</h2>

        <p>
            Pro otevřená data je registrace v Národním katalogu otevřených dat (NKOD), jež se stal součástí Národním katalogu dat (NKD), jedna ze <a href="https://www.e-sbirka.cz/eli/cz/sb/1999/106/2024-01-01/dokument/norma/cast_1/par_4c/odst_1">zákonných podmínek pro to, aby data mohla být nazývána otevřenými daty</a>.
            Datové sady s vysokou socio-ekonomickou hodnotou, tzv. High-Value Datasets, jsou datové sady identifikované v <a href="https://eur-lex.europa.eu/eli/reg_impl/2023/138/oj?locale=cs#">prováděcím nařízení</a>, musí být publikovány jako otevřená data, a navíc jsou na jejich metadatový popis i datový obsah kladeny zvýšené kvalitativní nároky.
            Tato otevřená formální norma specifikuje dodatečné požadavky na metadatový záznam HVD datové sady nad rámec těch, které musí splňovat pro <a href="../../../dcat-ap-cz-otevřená-data/">DCAT-AP-CZ: Datové sady otevřených dat</a>.
        </p>


        <p class="note">
          Součástí požadavků prováděcího nařízení HVD jsou i kvalitativní požadavky na metadatové záznamy.
          Ty zahrnují mj. perzistenci použitých identifikátorů (IRI) datových sad, datových služeb, podmínek užití, či koncových bodů služeb.
          Detailní informace viz <a href="https://semiceu.github.io/DCAT-AP/releases/3.0.0-hvd/#mapping-the-hvd-ir-to-dcat-ap">sekce 10 v DCAT-AP HVD</a>, zejména pak <a href="https://semiceu.github.io/DCAT-AP/releases/3.0.0-hvd/#c2">sekce 10.4</a>.
        </p>  


        </section>
